<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Builder SDK - Local Test</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu',
        'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
      background: #f5f5f5;
    }
    .container {
      display: flex;
      height: 100vh;
    }
    .sidebar {
      display: none;
    }
    .editor-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      width: 100%;
    }
    .header {
      background: white;
      border-bottom: 1px solid #e0e0e0;
      padding: 15px 20px;
      font-size: 14px;
    }
    .iframe-container {
      flex: 1;
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .sidebar h3 {
      margin-bottom: 15px;
      font-size: 14px;
      color: #333;
    }
    .sidebar textarea {
      width: 100%;
      height: 150px;
      padding: 10px;
      font-size: 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-family: monospace;
      margin-bottom: 15px;
    }
    .sidebar button {
      width: 100%;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      margin-bottom: 10px;
    }
    .sidebar button:hover {
      background: #0056b3;
    }
    .log-section {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #ddd;
    }
    .log-entry {
      font-size: 11px;
      padding: 5px;
      margin-bottom: 5px;
      background: #f9f9f9;
      border-radius: 3px;
      border-left: 3px solid #007bff;
      max-height: 60px;
      overflow: auto;
    }
    .log-entry.error {
      border-left-color: #dc3545;
      background: #fff5f5;
    }
    .log-entry.success {
      border-left-color: #28a745;
      background: #f5fff5;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    function TestApp() {
      const iframeRef = useRef(null);
      const [logs, setLogs] = useState([]);
      const [initialHtml, setInitialHtml] = useState(
        '<h1>Welcome</h1><p>Edit this email template</p>'
      );
      const [status, setStatus] = useState('loading');
      const builderWindowRef = useRef(null);

      const addLog = (message, type = 'info') => {
        setLogs((prev) => [
          { message: `[${new Date().toLocaleTimeString()}] ${message}`, type },
          ...prev,
        ].slice(0, 50));
      };

      useEffect(() => {
        function handleMessage(event) {
          // Only accept messages from the iframe
          if (event.source !== iframeRef.current?.contentWindow) {
            return;
          }

          // Only accept from Netlify origin
          if (!event.origin.includes('netlify.app')) {
            return;
          }

          const data = event.data;
          addLog(`← Received: ${data.type}`, 'info');

          if (data.type === 'READY') {
            addLog('Builder is ready, sending INIT...', 'success');
            iframeRef.current.contentWindow.postMessage(
              {
                type: 'INIT',
                payload: {
                  html: initialHtml,
                  config: { theme: 'light' },
                },
                meta: {
                  id: Math.random().toString(36).slice(2),
                  version: '1.0.0',
                  sentAt: Date.now(),
                },
              },
              '*'
            );
            setStatus('ready');
          }

          if (data.type === 'CHANGE') {
            addLog(`HTML changed (${data.payload.html.length} chars)`, 'info');
          }

          if (data.type === 'SAVE') {
            addLog(`Save triggered (${data.payload.html.length} chars)`, 'success');
            console.log('Saved HTML:', data.payload.html);
          }

          if (data.type === 'UPLOAD') {
            addLog('Upload requested', 'info');
            // Simulate upload success
            setTimeout(() => {
              iframeRef.current.contentWindow.postMessage(
                {
                  type: 'UPLOAD_SUCCESS',
                  payload: {
                    url: 'https://via.placeholder.com/300',
                  },
                  meta: {
                    correlationId: data.meta?.id,
                  },
                },
                '*'
              );
              addLog('Upload success response sent', 'success');
            }, 500);
          }
        }

        window.addEventListener('message', handleMessage);
        return () => window.removeEventListener('message', handleMessage);
      }, [initialHtml]);

      const handleLoadBuilder = () => {
        setStatus('loading');
        addLog('Loading builder iframe...', 'info');
      };

      const handleClearLogs = () => {
        setLogs([]);
      };

      const handleDownloadHtml = () => {
        if (logs.length === 0) {
          alert('No SAVE event received yet');
          return;
        }
        const lastSave = logs.find((log) => log.message.includes('Save triggered'));
        if (lastSave) {
          alert('Last save received. Check browser console for full HTML.');
        }
      };

      return (
        <div className="container">
          <div className="sidebar">
            <h3>Email Builder SDK Test</h3>

            <label>
              <strong>Initial HTML:</strong>
              <textarea
                value={initialHtml}
                onChange={(e) => setInitialHtml(e.target.value)}
                placeholder="Enter initial HTML..."
              />
            </label>

            <button onClick={handleLoadBuilder}>Reload Builder</button>
            <button onClick={handleDownloadHtml}>Download Last Saved</button>
            <button onClick={handleClearLogs}>Clear Logs</button>

            <div className="log-section">
              <h3>Event Log</h3>
              <div style={{ fontSize: '12px', color: '#666', marginBottom: '10px' }}>
                Status: <strong>{status}</strong>
              </div>
              {logs.length === 0 ? (
                <div style={{ color: '#999', fontSize: '12px' }}>Waiting for events...</div>
              ) : (
                logs.map((log, i) => (
                  <div key={i} className={`log-entry ${log.type}`}>
                    {log.message}
                  </div>
                ))
              )}
            </div>
          </div>

          <div className="editor-area">
            <div className="header">
              Email Builder (from
              <code style={{ marginLeft: '5px' }}>
                pc-email-template-builder.netlify.app
              </code>
              )
            </div>
            <div className="iframe-container">
              <iframe
                ref={iframeRef}
                src="https://pc-email-template-builder.netlify.app"
                title="Email Builder"
                onLoad={handleLoadBuilder}
                sandbox="allow-scripts allow-same-origin allow-forms"
              />
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<TestApp />, document.getElementById('root'));
  </script>
</body>
</html>
